name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '14.2'
        
    - name: Cache Swift packages
      uses: actions/cache@v3
      with:
        path: .build
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-
          
    - name: Resolve package dependencies
      run: swift package resolve
      
    - name: Build project
      run: swift build -v
      
    - name: Run tests
      run: swift test --enable-code-coverage
      
    - name: Generate code coverage report
      run: |
        xcrun llvm-cov export -format="lcov" \
          .build/debug/HotelBookingDemoPackageTests.xctest/Contents/MacOS/HotelBookingDemoPackageTests \
          -instr-profile .build/debug/codecov/default.profdata > info.lcov
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./info.lcov
        flags: unittests
        name: codecov-umbrella
        
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Swift
      uses: swift-actions/setup-swift@v1
      with:
        swift-version: "5.7"
        
    - name: Install SwiftLint
      run: |
        brew install swiftlint
        
    - name: Run SwiftLint
      run: swiftlint --strict
      
  deploy-preview:
    name: Deploy Preview
    needs: [build-and-test, code-quality]
    if: github.ref == 'refs/heads/develop'
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '14.2'
        
    - name: Build for distribution
      run: |
        xcodebuild -scheme HotelBookingDemo \
          -sdk iphoneos \
          -configuration Release \
          -archivePath build/HotelBookingDemo.xcarchive \
          archive
          
    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath build/HotelBookingDemo.xcarchive \
          -exportPath build \
          -exportOptionsPlist ExportOptions.plist
          
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: hotel-booking-demo-ipa
        path: build/HotelBookingDemo.ipa